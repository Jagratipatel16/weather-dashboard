<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Modern Weather Dashboard using HTML, CSS and JavaScript">

    <meta name="author"
        content="Jagrati Patel">

    <title>Weather Dashboard</title>

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <h1>

            <i class="fa-solid fa-cloud-sun"></i>

            Weather Dashboard

        </h1>

        <button id="themeBtn">

            <i class="fa-solid fa-moon"></i>

        </button>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- Search -->

        <section class="search-section">

            <div class="search-box">

                <input
                    type="text"
                    id="city"
                    placeholder="Enter city name..."
                    autocomplete="off">

                <button id="searchBtn">

                    <i class="fa-solid fa-magnifying-glass"></i>

                </button>

                <button id="locationBtn">

                    <i class="fa-solid fa-location-crosshairs"></i>

                </button>

            </div>

            <!-- Search History -->

            <div id="history"></div>

        </section>

        <!-- Loader -->

        <div id="loader" class="hidden">

            <div class="spinner"></div>

            <p>Loading weather...</p>

        </div>

        <!-- Error -->

        <div id="error" class="hidden"></div>

        <!-- ================= WEATHER ================= -->

        <section id="weather" class="hidden">

            <!-- Top -->

            <div class="weather-top">

                <div>

                    <h2 id="cityName"></h2>

                    <p id="country"></p>

                    <p id="localTime"></p>

                </div>

                <img
                    id="icon"
                    src=""
                    alt="Weather Icon">

            </div>

            <!-- Temperature -->

            <div class="temperature-section">

                <h1 id="temperature"></h1>

                <button id="unitBtn">

                    °C / °F

                </button>

            </div>

            <h3 id="condition"></h3>

            <!-- Weather Details -->

            <section class="details">

                <div class="card">

                    <i class="fa-solid fa-temperature-half"></i>

                    <h4>Feels Like</h4>

                    <span id="feels"></span>

                </div>

                <div class="card">

                    <i class="fa-solid fa-droplet"></i>

                    <h4>Humidity</h4>

                    <span id="humidity"></span>

                </div>

                <div class="card">

                    <i class="fa-solid fa-wind"></i>

                    <h4>Wind Speed</h4>

                    <span id="wind"></span>

                </div>

                <div class="card">

                    <i class="fa-solid fa-eye"></i>

                    <h4>Visibility</h4>

                    <span id="visibility"></span>

                </div>
                                <div class="card">

                    <i class="fa-solid fa-sun"></i>

                    <h4>Sunrise</h4>

                    <span id="sunrise"></span>

                </div>

                <div class="card">

                    <i class="fa-solid fa-moon"></i>

                    <h4>Sunset</h4>

                    <span id="sunset"></span>

                </div>

            </section>

            <!-- ================= AIR QUALITY ================= -->

            <section class="air-quality">

                <h2>

                    <i class="fa-solid fa-wind"></i>

                    Air Quality

                </h2>

                <div class="aqi-card">

                    <h3 id="aqiStatus">

                        🟢 Good

                    </h3>

                    <p id="aqiMessage">

                        Air quality is good.
                        Enjoy your outdoor activities.

                    </p>

                </div>

            </section>

            <!-- ================= FORECAST ================= -->

            <section class="forecast-section">

                <h2>

                    <i class="fa-solid fa-calendar-days"></i>

                    3-Day Forecast

                </h2>

                <div id="forecast">

                </div>

            </section>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            Made with ❤️ by Jagrati Patel

        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
